[package]
name = "bebeu-engine"
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "bebeu-engine"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
thiserror = "2.0.17"
serde.workspace = true
serde-saphyr.workspace = true
tracing.workspace = true

bevy = { version = "0.19", features = ["wav"] }
# SoundGroup.pick の重み付き乱選で使う (ADR-0019)。
# 簡易乱数で十分なので thread_rng + Uniform レベル機能のみ使う。
rand = "0.9"

[features]
# 開発時のリンク高速化用 (Bevy 推奨)。
# bevy_dylib 経由で動的リンクに切り替え、static link の重さを回避する。
# 配布 binary では使わない (libbevy_dylib.dll を同梱する必要が出るため)。
# `just engine-run` / `just engine-run-sample` 経由で有効化される。
dev = ["bevy/dynamic_linking"]

[dev-dependencies]
tempfile.workspace = true

[lints.clippy]
all = { level = "warn", priority = -1 }
doc_markdown = "allow"
expect_used = "allow"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
panic = "warn"
pedantic = { level = "warn", priority = -1 }
todo = "warn"
unwrap_used = "warn"
# Bevy の system シグネチャ (Res<T>, Query<...> を値で受ける) と相性が悪い
needless_pass_by_value = "allow"
# engine 起動経路は将来 ? で bubble up したいため Result を返す形を維持
unnecessary_wraps = "allow"
# 画像ピクセル座標 (i32/u32) を Bevy の Vec3 (f32) に乗せる場面が頻発する。
# 実値は < ~100K で f32 mantissa 23bit 内に収まり精度損失は事実上ゼロ
cast_precision_loss = "allow"
# Bevy の Query<...> は filter / tuple 合成で型がネストしがち。
# 個別 allow を散らすより crate 全体で許容する
type_complexity = "allow"

[lints.rust]
unsafe_code = "forbid"

# 早期スキャフォールディング段階: API 表面が UI 配線前に追加されるため許容
dead_code = "allow"
unused_imports = "allow"
