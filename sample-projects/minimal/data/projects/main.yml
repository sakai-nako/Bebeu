resolution:
  width: 384
  height: 216
players:
- hero
opponents:
- enemy
# ADR-0035 Phase 2: Player の隣で共闘する味方 NPC。`ai: kind: ally` を持つ character のみ
# 受け付ける (それ以外は battle 起動時に warn を吐いて skip)。
allies:
- ally
levels:
- training
hud:
  elements:
  # P1 HP bar (画面左上)。`id: p1_hp` で後続の enemy bar から anchor 参照できるようにする。
  - kind: player_hp_bar
    id: p1_hp
    target: p1
    anchor: top_left
    offset:
      x: 16.0
      "y": 16.0
    size:
      w: 120.0
      h: 8.0
    frame:
      thickness: 1.0
      color: "#000000"
    bg_color: "#00000099"
    fg_color: "#e62626"
    fill_direction: left_to_right
    gauge_step:
      fixed_count: 1
    gauge_gap: 0.0
  # ADR-0031: P1 が最後に殴った enemy の HP bar を P1 HP の真下に貼り付け。
  # 攻撃が成立すると engagement target が切り替わって bar の中身が変わる。
  - kind: enemy_hp_bar
    target:
      last_engaged_by: p1
    anchor_to:
      id: p1_hp
      edge: bottom_left
    offset:
      x: 0.0
      "y": 4.0
    size:
      w: 120.0
      h: 6.0
    frame:
      thickness: 1.0
      color: "#000000"
    bg_color: "#00000099"
    fg_color: "#f2d82c"
    fill_direction: left_to_right
  # ADR-0032: 各 enemy の頭上に追従する小さい bar。`vertical_anchor: image_top` で
  # ジャンプ等で sprite が縦に伸びても自動で頭上に追従する。
  - kind: enemy_overhead_hp_bar
    size:
      w: 28.0
      h: 4.0
    frame:
      thickness: 1.0
      color: "#000000"
    bg_color: "#00000099"
    fg_color: "#f2d82c"
    vertical_anchor: image_top
    offset_y: 4.0
    fill_direction: left_to_right
  # ADR-0033: P1 の状態を顔絵で示す Icon HUD。HP bar の真下に置き、attack で表情変化 +
  # 被弾 / 攻撃当てで微振動。sprite_group_number は hero/sprite-groups/icons.yml の number。
  - kind: player_icon
    target: p1
    anchor: top_left
    offset:
      x: 8.0
      "y": 32.0
    size:
      w: 40.0
      h: 40.0
    frame:
      thickness: 1.0
      color: "#000000"
    sprite_group_number: 100
    default_sprite_index: 0
    state_sprites:
      idle: 0
      walk: 0
      attack: 1
      hit: 2
      knockback_up: 2
      knockback_down: 2
    shake:
      on_damage:
        duration_ms: 200
        shake_x: 0
        shake_y: 3
        count: 4
        decay: 1.0
      on_attack_hit:
        duration_ms: 80
        shake_x: 2
        shake_y: 0
        count: 2
        decay: 0.5
